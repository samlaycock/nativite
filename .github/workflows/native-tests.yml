name: 🧪 Native Test Suite

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/native-tests.yml"
      - "bun.lock"
      - "package.json"
      - "scripts/test-native-android.ts"
      - "scripts/test-native-ios.ts"
      - "src/native/android/runtime/**"
      - "src/native/ios/runtime/**"
  workflow_dispatch:

jobs:
  ios:
    name: iOS runtime tests
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run iOS native tests
        run: bun run test:native:ios

  android:
    name: Android runtime tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Android native tests
        run: bun run test:native:android
